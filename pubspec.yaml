name: net_retrofit_dio
description: >-
  Declarative HTTP for Flutter/Dio: annotate APIs, generate implementations with
  build_runner.
version: 0.1.2
repository: https://github.com/Dong-Hong-Li/net_retrofit_dio
homepage: https://github.com/Dong-Hong-Li/net_retrofit_dio
issue_tracker: https://github.com/Dong-Hong-Li/net_retrofit_dio/issues

topics:
  - flutter
  - networking
  - retrofit
  - code-generation
  - dio

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  # Lower bound 8.1.x: Element.metadata.annotations + formalParameters (pana downgrade).
  # Upper bound aligned with source_gen / build_runner.
  analyzer: ">=8.1.1 <13.0.0"
  build: ">=4.0.0 <5.0.0"
  # 5.2+ exports DioException / DioExceptionType (not DioError-only 5.0.x).
  dio: ">=5.2.1 <6.0.0"
  flutter:
    sdk: flutter
  meta: ">=1.11.0 <2.0.0"
  source_gen: ">=4.0.0 <6.0.0"

dev_dependencies:
  build_runner: ^2.13.1
  lints: ^5.0.0
  test: ^1.25.0

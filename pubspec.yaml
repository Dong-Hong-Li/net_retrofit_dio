name: net_retrofit_dio
description: >-
  Declarative HTTP for Flutter/Dio: annotate APIs, generate implementations with
  build_runner.

homepage: https://github.com/Dong-Hong-Li/net_retrofit_dio
repository: https://github.com/Dong-Hong-Li/net_retrofit_dio
issue_tracker: https://github.com/Dong-Hong-Li/net_retrofit_dio/issues

topics:
  - flutter
  - networking
  - retrofit
  - code-generation
  - dio

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  analyzer: ">=6.9.0 <9.0.0"
  build: ">=2.4.0 <4.0.5"
  dio: ">=5.0.0 <5.9.2"
  flutter:
    sdk: flutter
  meta: ^1.11.0
  source_gen: ">=1.5.0 <6.0.0"

dev_dependencies:
  build_runner: ^2.4.13
  lints: ^5.0.0
  test: ^1.25.0
